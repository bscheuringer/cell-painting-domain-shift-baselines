defaults:
  - _self_
  - logger: wandb            # choose: wandb | none
  - method: erm              # choose: erm | dann | instance_norm

# ---- paths / hydra ----
# Resolve all experiment artifacts relative to the original working
# directory from which the training script is invoked.  Hydra stores the
# value in ``hydra:runtime.cwd`` and keeps it stable even though Hydra
# changes the process' working directory during a run.
base_dir: ${hydra:runtime.cwd}

hydra:
  run:
    dir: ${base_dir}/outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${base_dir}/multiruns/${now:%Y-%m-%d_%H-%M-%S}

seed: 42
work_dir: ${base_dir}

# ---- DATA ----
data:
  parquet_path: "${base_dir}/data/indices/JKU_JUMPCP_Source3_AllPositives.parquet"
  img_root: "/path/to/jumpcp/images"
  fold_config_file: "${base_dir}/data/splits/folds_k5_seed42.json"
  fold_index: 0
  return_domain: true
  label_col: "Metadata_JCP2022"
  batch_col: "Metadata_Batch"
  sample_col: "Metadata_Sample_ID"
  ext: ".jpg"
  nested_by_batch: false   # true = images stored as <img_root>/<batch>/<sample>.jpg (Leonardo)
  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4       # batches queued per worker; 4 helps on NFS/slow storage
  image_size: 224

# ---- MODEL ----
# framework is injected by the method config group above.
model:
  backbone: "resnet50"
  pretrained: true
  in_channels: 5
  lr: 6e-4
  weight_decay: 1e-4
  optimizer: "adamw"
  label_smoothing: 0.0
  scheduler: null

# ---- TRAIN (Trainer args only) ----
train:
  accelerator: "auto"  # auto (gpu if available else cpu) or "gpu", "cpu", "tpu", "mps"
  devices: 1
  precision: 32         # 32 = safe default for P40; use "16-mixed" on RTX 30xx/40xx/50xx
  log_every_n_steps: 50 # reduce W&B API calls; dataset is large (~22k steps/epoch at bs=16)
  val_check_interval: 1.0
  enable_checkpointing: true
  early_stopping_patience: 5
  max_epochs: 50
  checkpoint_dir: null     # override to save checkpoints elsewhere (e.g. $WORK on HPC)
  gradient_clip_val: null  # set to e.g. 1.0 for DANN to tame GRL gradients if needed
  # tiny-overfit / debugging knobs (optional)
  max_steps: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  overfit_batches: null
